<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>camia幸運輪盤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%); 
            color: white;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 讓內容自動垂直分配空間 */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* 均勻分配標題、輪盤、按鈕的距離 */
            padding: 20px 0;
        }
        .wheel-box { 
            position: relative; 
            width: 90vw; 
            max-width: 400px; 
            height: 90vw; 
            max-height: 400px; 
            margin: 0 auto; 
        }
        .pointer { 
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 30px; 
            height: 40px; 
            background: #ef4444; 
            clip-path: polygon(50% 100%, 0 0, 100% 0); 
            z-index: 20; 
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.6)); 
        }
        canvas { width: 100% !important; height: 100% !important; border-radius: 50%; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .btn-spin { 
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1 class="text-4xl font-black text-center text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-yellow-500 tracking-widest">
            camia幸運輪盤
        </h1>

        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
        </div>

        <div class="flex flex-col items-center gap-4">
            <button id="spinBtn" class="btn-spin text-white font-black py-4 px-12 rounded-full text-2xl active:scale-95 transition-transform disabled:opacity-50">
                開始旋轉
            </button>
            <div id="result" class="text-2xl font-bold text-yellow-400 h-8 text-center drop-shadow-md"></div>
        </div>
    </div>

    <script>
        const prizeData = {
            high: [{name:"上上籤",color:"#FFD700"},{name:"頭獎",color:"#FF1493"}],
            mid: [{name:"二獎",color:"#FF8C00"},{name:"二獎",color:"#FF8C00"},{name:"三獎",color:"#9333ea"},{name:"三獎",color:"#9333ea"},{name:"三獎",color:"#9333ea"}],
            low: Array(5).fill({name:"四獎",color:"#3b82f6"}),
            cons: Array(10).fill({name:"安慰獎",color:"#10b981"}),
            retry: {name:"再接再厲",color:"#475569"}
        };

        let prizes = Array(50).fill(prizeData.retry);
        const winners = [prizeData.high[0], prizeData.cons[0], prizeData.mid[2], prizeData.cons[1], prizeData.low[0], prizeData.high[1], prizeData.cons[2], prizeData.mid[3], prizeData.cons[3], prizeData.low[1], prizeData.mid[0], prizeData.cons[4], prizeData.low[2], prizeData.cons[5], prizeData.mid[4], prizeData.cons[6], prizeData.low[3], prizeData.cons[7], prizeData.mid[1], prizeData.cons[8], prizeData.low[4], prizeData.cons[9]];
        let step = 50 / winners.length;
        winners.forEach((p, i) => { prizes[Math.floor(i * step)] = p; });

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        let currentRot = 0;
        let isSpinning = false;

        function draw() {
            const arc = (2 * Math.PI) / 50;
            ctx.clearRect(0,0,800,800);
            prizes.forEach((p, i) => {
                const ang = i * arc + currentRot;
                ctx.beginPath(); ctx.fillStyle = p.color; ctx.moveTo(400, 400);
                ctx.arc(400, 400, 380, ang, ang + arc); ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 1; ctx.stroke();
                ctx.save(); ctx.translate(400, 400); ctx.rotate(ang + arc/2);
                ctx.fillStyle = (p.color === "#FFD700") ? "black" : "white";
                ctx.font = "bold 16px Arial"; ctx.fillText(p.name, 260, 6); ctx.restore();
            });
            // 畫中心圓
            ctx.beginPath(); ctx.arc(400, 400, 20, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill();
        }

        spinBtn.onclick = () => {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.innerText = "";
            let spinTime = 4000;
            let start = null;
            let totalRotation = 30 + Math.random() * 20; 
            let initialRot = currentRot;

            function ani(ts) {
                if(!start) start = ts;
                let progress = ts - start;
                let t = progress / spinTime;
                let easing = 1 - Math.pow(1 - t, 4); // 減速效果
                currentRot = initialRot + totalRotation * easing;
                draw();
                if(progress < spinTime) requestAnimationFrame(ani);
                else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    const final = (1.5 * Math.PI - (currentRot % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
                    const idx = Math.floor(final / ((2*Math.PI)/50));
                    resultDiv.innerText = "獲得獎項：" + prizes[idx].name;
                }
            }
            requestAnimationFrame(ani);
        };
        draw();
    </script>
</body>
</html>
